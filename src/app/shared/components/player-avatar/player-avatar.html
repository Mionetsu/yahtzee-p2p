<div class="avatar"
  [class]="'avatar--' + size()"
  [style.background]="avatarImage() ? 'transparent' : avatarColor()">

  @if (avatarImage()) {
    <img class="avatar__img" [src]="avatarImage()" alt="avatar" />
  } @else {
    <svg class="avatar__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="8" r="4" fill="rgba(0,0,0,0.5)"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="rgba(0,0,0,0.5)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  }

</div>
